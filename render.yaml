# =========================================================
# VTY Logistics — Render.com Static Site config
# Deploy: connect repo qua dashboard Render → auto detect file này
# =========================================================
services:
  - type: web
    name: vty-logistics
    runtime: static
    buildCommand: ""           # Không cần build — HTML/CSS/JS thuần
    staticPublishPath: .       # Serve từ root project
    autoDeploy: true           # Tự deploy mỗi khi push nhánh main
    pullRequestPreviewsEnabled: false

    # JS/CSS app: luôn revalidate (ETag) để update hiện ngay, không kẹt cache 1h
    headers:
      - path: /styles/*
        name: Cache-Control
        value: no-cache
      - path: /scripts/*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
